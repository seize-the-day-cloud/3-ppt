<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lentot - 기존 대안 vs LENTOT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    display: flex;
    flex-direction: column;
    background: #07091A;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  }

  .bg-blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
  .bg-blob-1 {
    width: 560px; height: 560px;
    background: radial-gradient(circle, rgba(158,123,53,0.26) 0%, transparent 70%);
    top: -180px; left: -120px; filter: blur(82px);
    animation: blob1 24s ease-in-out infinite;
  }
  .bg-blob-2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(41,137,95,0.24) 0%, transparent 70%);
    bottom: -145px; right: -110px; filter: blur(86px);
    animation: blob2 30s ease-in-out infinite;
  }
  .bg-blob-3 {
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(130,34,44,0.16) 0%, transparent 70%);
    top: 48%; left: 28%; filter: blur(76px);
    animation: blob3 22s ease-in-out infinite;
  }
  @keyframes blob1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(90px,70px)} 66%{transform:translate(-50px,130px)} }
  @keyframes blob2 { 0%,100%{transform:translate(0,0)} 40%{transform:translate(-110px,-90px)} 70%{transform:translate(70px,-130px)} }
  @keyframes blob3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-90px,-60px)} }

  .agenda-strip, .title-section, .comparison-board { position: relative; z-index: 1; }
  .agenda-strip {
    height: 44px;
    flex-shrink: 0;
    display: flex;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    opacity: 0;
    transition: opacity 200ms ease;
  }
  .agenda-strip.visible { opacity: 1; }
  .strip-item {
    flex: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 0 4px;
    border-right: 1px solid rgba(255,255,255,0.05);
    overflow: hidden;
  }
  .strip-item:last-child { border-right: 0; }
  .strip-item.active {
    background: rgba(158,123,53,0.13);
    border-bottom: 2px solid #C4973F;
    animation: activePulse 1800ms ease-in-out infinite;
  }
  @keyframes activePulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.035)} }
  .strip-num {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.05em;
    color: rgba(255,255,255,0.28);
  }
  .strip-label {
    max-width: 100%;
    color: rgba(255,255,255,0.2);
    font-size: 9px;
    font-weight: 650;
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .strip-item.active .strip-num { color: #C4973F; }
  .strip-item.active .strip-label { color: rgba(196,151,63,0.78); }

  .title-section {
    padding: 24px 52px 16px;
    flex-shrink: 0;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 450ms ease, transform 450ms ease;
  }
  .title-section.visible { opacity: 1; transform: translateY(0); }
  .title-tag {
    color: #D7AF5B;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.24em;
    margin-bottom: 10px;
  }
  .main-title {
    font-size: 58px;
    font-weight: 850;
    line-height: 1.02;
    letter-spacing: -0.035em;
  }

  .comparison-board {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-rows: 68px repeat(4, 1fr);
    gap: 10px;
    padding: 0 52px 34px;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 540ms ease, transform 540ms ease;
  }
  .comparison-board.visible { opacity: 1; transform: translateY(0); }
  .table-row {
    position: relative;
    display: grid;
    grid-template-columns: 0.92fr 1.05fr 1.14fr;
    gap: 14px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 460ms ease, transform 460ms ease;
  }
  .table-row.visible { opacity: 1; transform: translateY(0); }

  /* ── per-row sweep: gradient band flows left→right through each row ── */
  .table-row:nth-child(n+2)::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transform: translateX(-110%);
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255,255,255,0.06) 18%,
      rgba(255,80,80,0.08)  48%,
      rgba(60,210,140,0.10) 78%,
      transparent 100%
    );
    animation: rowFlow 4.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }
  .table-row:nth-child(2)::after { animation-delay:  0.0s; }
  .table-row:nth-child(3)::after { animation-delay:  1.2s; }
  .table-row:nth-child(4)::after { animation-delay:  2.4s; }
  .table-row:nth-child(5)::after { animation-delay:  3.6s; }

  @keyframes rowFlow {
    0%   { transform: translateX(-110%); opacity: 0; }
    8%   { opacity: 1; }
    84%  { opacity: 0.85; }
    100% { transform: translateX(110%); opacity: 0; }
  }
  .cell {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    min-width: 0;
    padding: 0 20px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.065);
    box-shadow: 0 14px 42px rgba(0,0,0,0.24);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
  }
  .cell > span { position: relative; z-index: 2; }
  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    transform: translateX(-120%);
    opacity: 0;
    animation: columnWash 7.8s ease-in-out infinite;
  }
  .head-cell {
    color: #D7AF5B;
    font-size: 24px;
    font-weight: 850;
    letter-spacing: -0.02em;
    background: rgba(255,255,255,0.08);
  }
  .head-cell.solution {
    color: #07111D;
    background: linear-gradient(135deg, #D7AF5B, #E4C474);
    border-color: rgba(215,175,91,0.7);
  }
  .body-cell {
    color: rgba(255,255,255,0.9);
    font-size: 24px;
    font-weight: 650;
    line-height: 1.28;
    word-break: keep-all;
  }
  .alt::after {
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
  }
  .problem::after {
    background: linear-gradient(90deg, transparent, rgba(255,92,92,0.18), transparent);
  }
  .solution {
    color: #48D597;
    font-weight: 820;
  }
  .solution::after {
    background: linear-gradient(90deg, transparent, rgba(72,213,151,0.18), transparent);
  }
  .table-row:nth-child(3) .cell::after { animation-delay: 0.55s; }
  .table-row:nth-child(4) .cell::after { animation-delay: 1.1s; }
  .table-row:nth-child(5) .cell::after { animation-delay: 1.65s; }
  @keyframes columnWash {
    0%, 22% { transform: translateX(-120%); opacity: 0; }
    34% { opacity: 1; }
    54% { opacity: 0.9; }
    72%, 100% { transform: translateX(120%); opacity: 0; }
  }

  @media (max-width: 1100px) {
    .title-section, .comparison-board { padding-left: 34px; padding-right: 34px; }
    .main-title { font-size: 48px; }
    .body-cell { font-size: 20px; }
    .head-cell { font-size: 21px; }
  }

  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1000;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: rgba(255,255,255,0.5);
    font-size: 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    outline: none;
    transition: background 200ms ease, color 200ms ease, border-color 200ms ease, transform 200ms ease;
  }
  .nav-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-color: rgba(215,175,91,0.5);
    transform: translateY(-50%) scale(1.1);
  }
  .nav-btn--prev { left: 20px; }
  .nav-btn--next { right: 20px; }
</style>
</head>
<body>
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

<nav class="agenda-strip" id="agenda-strip">
  <div class="strip-item"><span class="strip-num">01</span><span class="strip-label">문제 정의</span></div>
  <div class="strip-item"><span class="strip-num">02</span><span class="strip-label">고객 탐색</span></div>
  <div class="strip-item"><span class="strip-num">03</span><span class="strip-label">인터뷰 검증</span></div>
  <div class="strip-item active"><span class="strip-num">04</span><span class="strip-label">솔루션 &amp; 가치</span></div>
  <div class="strip-item"><span class="strip-num">05</span><span class="strip-label">경쟁 분석</span></div>
  <div class="strip-item"><span class="strip-num">06</span><span class="strip-label">수익 구조</span></div>
  <div class="strip-item"><span class="strip-num">07</span><span class="strip-label">향후 계획</span></div>
</nav>

<section class="title-section" id="title-section">
  <div class="title-tag">04 · 솔루션 &amp; 가치제안</div>
  <h1 class="main-title">기존 대안 vs LENTOT</h1>
</section>

<main class="comparison-board" id="comparison-board">
  <section class="table-row visible">
    <div class="cell head-cell alt"><span>기존 대안</span></div>
    <div class="cell head-cell problem"><span>문제점</span></div>
    <div class="cell head-cell solution"><span>LENTOT 해결</span></div>
  </section>
  <section class="table-row">
    <div class="cell body-cell alt"><span>일회성 의류 구매</span></div>
    <div class="cell body-cell problem"><span>여행 후 안 입음 → 낭비</span></div>
    <div class="cell body-cell solution"><span>필요 기간만 대여, 낭비 제로</span></div>
  </section>
  <section class="table-row">
    <div class="cell body-cell alt"><span>위탁수하물 추가</span></div>
    <div class="cell body-cell problem"><span>5~7만 원 + 짐 그대로</span></div>
    <div class="cell body-cell solution"><span>현지 수령으로 옷 짐 해소</span></div>
  </section>
  <section class="table-row">
    <div class="cell body-cell alt"><span>스타일 포기</span></div>
    <div class="cell body-cell problem"><span>여행 만족도 하락</span></div>
    <div class="cell body-cell solution"><span>짐 줄이고 다양한 코디 선택</span></div>
  </section>
  <section class="table-row">
    <div class="cell body-cell alt"><span>직접 코디 준비</span></div>
    <div class="cell body-cell problem"><span>시간 · 정보 부담</span></div>
    <div class="cell body-cell solution"><span>날씨 · 일정별 코디 자동 추천</span></div>
  </section>
</main>

<script>
(function () {
  var strip = document.getElementById('agenda-strip');
  var title = document.getElementById('title-section');
  var board = document.getElementById('comparison-board');
  var rows = Array.from(document.querySelectorAll('.table-row'));
  var fromSixth = sessionStorage.getItem('fromSixth') === '1';
  sessionStorage.removeItem('fromSixth');

  strip.classList.add('visible');
  setTimeout(function () { title.classList.add('visible'); }, fromSixth ? 120 : 0);
  setTimeout(function () { board.classList.add('visible'); }, fromSixth ? 260 : 0);
  rows.forEach(function (row, i) {
    setTimeout(function () { row.classList.add('visible'); }, (fromSixth ? 360 : 80) + i * 100);
  });

  var going = false;

  function goNext() {
    if (going) return;
    going = true;
    title.style.opacity = '0';
    title.style.transform = 'translateY(-12px)';
    board.style.opacity = '0';
    board.style.transform = 'translateY(18px)';
    sessionStorage.setItem('fromSeventh', '1');
    setTimeout(function () { window.location.href = 'eighth.html'; }, 420);
  }

  function goPrev() {
    if (going) return;
    going = true;
    document.body.style.transition = 'opacity 300ms ease';
    document.body.style.opacity = '0';
    setTimeout(function () { window.location.href = 'sixth.html'; }, 320);
  }

  document.addEventListener('click', function (e) {
    var navBtn = e.target.closest && e.target.closest('.nav-btn');
    if (navBtn) {
      if (navBtn.id === 'nav-prev') goPrev();
      else if (navBtn.id === 'nav-next') goNext();
      return;
    }
    goNext();
  });
})();
</script>

<button class="nav-btn nav-btn--prev" id="nav-prev" aria-label="이전 슬라이드">‹</button>
<button class="nav-btn nav-btn--next" id="nav-next" aria-label="다음 슬라이드">›</button>
</body>
</html>
